name: Docker Build ->Image ->Deploy

on:
  push:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Jar
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests


      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{secrets.DOCKERHUB_USERNAME}}/ticketbay .

      - name: Push Docker Image
        run: docker push ${{secrets.DOCKERHUB_USERNAME}}/ticketbay:latest

      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DB_URL,G_ID,G_SECRET,DOCKER_USER
        env:
          DB_URL: ${{ secrets.DB_URL }}
          G_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          G_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          
          script: |
            docker pull $DOCKER_USER/ticketbay:latest
            docker stop ticketbay || true
            docker rm ticketbay || true
            docker run -d --name ticketbay -p 8000:8000 -e DB_URL="$DB_URL" -e GOOGLE_CLIENT_ID="$G_ID" -e GOOGLE_CLIENT_SECRET="$G_SECRET" $DOCKER_USER/ticketbay:latest
